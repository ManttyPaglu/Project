<!DOCTYPE html>
<html>
<head>
  <title>Be My Valentine? 💗</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      background:
        url("https://media.tenor.com/9k6K0Z2pJ9QAAAAC/hello-kitty.gif") center/200px no-repeat,
        url("https://media.tenor.com/l0vhecQm8xUAAAAC/cute-cat.gif") bottom right/200px no-repeat,
        linear-gradient(135deg, #ffb6c1, #ffd1dc);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      background: rgba(255, 255, 255, 0.9);
      padding: 30px;
      border-radius: 25px;
      text-align: center;
      max-width: 400px;
    }

    h1 {
      color: #d81b60;
    }

    .btn {
      display: inline-block;
      margin: 15px;
      padding: 12px 30px;
      font-size: 20px;
      color: white;
      background-color: #d81b60;
      border-radius: 50px;
      text-decoration: underline;
      transition: transform 0.2s, background-color 0.2s;
    }

    .btn:hover {
      transform: scale(1.08);
      background-color: #ad1457;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Will you be my Valentine? 🐱💖</h1>
    <p>I made something just for you</p>

    <a class="btn" href="yes.html">Yes 💕</a>
    <a class="btn" href="no.html">No 😼</a>
  </div>
</body>
</html>
