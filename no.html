<!DOCTYPE html>
<html>
<head>
  <title>You Don't Love Me? 💔</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 30px;
      background:
        url("https://media.tenor.com/9k6K0Z2pJ9QAAAAC/hello-kitty.gif") top left/200px no-repeat,
        url("https://media.tenor.com/l0vhecQm8xUAAAAC/cute-cat.gif") bottom right/200px no-repeat,
        linear-gradient(135deg, #ffb6c1, #ffd1dc);
    }

    video {
      width: 90%;
      max-width: 500px;
      border-radius: 20px;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 10px 28px;
      font-size: 18px;
      color: white;
      background-color: #d81b60;
      border-radius: 50px;
      text-decoration: underline;
      cursor: pointer;
      transition: transform 0.2s, background-color 0.2s;
    }

    .btn:hover {
      transform: scale(1.08);
      background-color: #ad1457;
    }
  </style>
</head>

<body>

  <video controls autoplay>
    <source src="no.mp4" type="video/mp4">
  </video>

  <br>
  <div class="btn" onclick="history.back()">← Back</div>

</body>
</html>
